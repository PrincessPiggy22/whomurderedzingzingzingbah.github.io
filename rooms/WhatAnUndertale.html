<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

 
    <title>Boss Fight</title>
    <link rel="stylesheet" href="undertale.css"/>
    <script src="loraxUndertale.js" defer></script>
</head>
<body>
    <div class="Room">
        <div id="healthBars">
            <div id="playerHealthBar">
                <div id="playerHealthFill"></div>
                <span>Player</span>
            </div>
            <div id="bossHealthBar">
                <div id="bossHealthFill"></div>
                <span>Lorax</span>
            </div>
        </div>
        <div id="phaseText">Safe Phase</div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <button id="attackButton">
            <img src="../sprites/Key.png" alt="Attack" width="50" height="50">
        </button>
    </div>
        
</body>
